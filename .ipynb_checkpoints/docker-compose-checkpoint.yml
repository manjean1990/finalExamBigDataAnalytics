version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  hbase:
    image: dajobe/hbase:latest
    container_name: ecommerce-hbase
    ports:
      - "2181:2181"
      - "8080:8080"
      - "8085:8085"
      - "9090:9090"
      - "9095:9095"
      - "16000:16000"
      - "16010:16010"
      - "16020:16020"
      - "16030:16030"
    restart: unless-stopped

  spark:
    image: apache/spark:3.5.6
    container_name: ecommerce-spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"
      - "7077:7077"
    volumes:
      - ./:/workspace
    restart: unless-stopped

volumes:
  mongo_data: